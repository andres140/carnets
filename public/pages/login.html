<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — SENA Carnés</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/login.css" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-bg"></div>
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5 col-lg-4">
        <div class="card login-card shadow-lg border-0">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="login-logo mb-3">SENA</div>
              <h1 class="h4 fw-bold text-primary">Carnés Institucionales</h1>
              <p class="text-muted small mb-0">Sistema de Gestión y Generación</p>
            </div>

            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">
                  <i class="bi bi-envelope me-1"></i>Correo electrónico
                </label>
                <input type="email" class="form-control form-control-lg" id="email"
                       name="email" placeholder="admin@sena.edu.co"
                       required autocomplete="username">
              </div>
              <div class="mb-4">
                <label for="password" class="form-label">
                  <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <input type="password" class="form-control form-control-lg" id="password"
                       name="password" required autocomplete="current-password">
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100" id="btnLogin">
                <span id="btnText">Iniciar sesión</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
              </button>
            </form>

            <div class="text-center mt-4">
              <a href="/" class="text-muted small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
              </a>
            </div>
          </div>
        </div>
        <p class="text-center text-white-50 small mt-3">
          Servicio Nacional de Aprendizaje — Colombia
        </p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
