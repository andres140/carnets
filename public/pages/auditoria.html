<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría — SENA Carnés</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/sena.css" rel="stylesheet">
  <link href="/css/auditoria.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/dashboard.html"><i class="bi bi-journal-text me-2"></i>SENA Carnés</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/reportes.html">Reportes</a></li>
          <li class="nav-item"><a class="nav-link active" href="/auditoria.html">Auditoría</a></li>
          <li class="nav-item nav-sistema d-none"><a class="nav-link" href="/sistema.html">Sistema</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <div id="notifNavSlot"></div>
          <span class="text-white-50 small" id="userName"></span>
          <button class="btn btn-outline-light btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i> Salir</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div class="audit-hero mb-4">
      <h1 class="h3 fw-bold mb-1">Bitácora de auditoría</h1>
      <p class="text-muted mb-0 small">Trazabilidad completa de acciones del sistema en tiempo real</p>
    </div>

    <div class="card border-0 shadow-sm mb-3">
      <div class="card-body">
        <form id="formFiltros" class="row g-2 align-items-end">
          <div class="col-md-2"><label class="form-label small">Búsqueda</label><input class="form-control form-control-sm" name="search" placeholder="Acción, usuario…"></div>
          <div class="col-md-2"><label class="form-label small">Acción</label><select class="form-select form-select-sm" name="accion" id="selAccion"><option value="">Todas</option></select></div>
          <div class="col-md-2"><label class="form-label small">Módulo</label><select class="form-select form-select-sm" name="modulo" id="selModulo"><option value="">Todos</option></select></div>
          <div class="col-md-2"><label class="form-label small">Resultado</label><select class="form-select form-select-sm" name="resultado"><option value="">Todos</option><option value="EXITO">Éxito</option><option value="ERROR">Error</option></select></div>
          <div class="col-md-2"><label class="form-label small">Desde</label><input type="date" class="form-control form-control-sm" name="fechaDesde"></div>
          <div class="col-md-2"><label class="form-label small">Hasta</label><input type="date" class="form-control form-control-sm" name="fechaHasta"></div>
          <div class="col-md-2"><label class="form-label small">IP</label><input class="form-control form-control-sm" name="ip"></div>
          <div class="col-md-4 d-flex gap-2"><button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i> Consultar</button><button type="button" class="btn btn-outline-secondary btn-sm" id="btnLimpiar">Limpiar</button></div>
        </form>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-0 table-responsive" style="max-height:560px">
        <table class="table table-hover audit-table mb-0">
          <thead class="table-light sticky-top">
            <tr>
              <th>Fecha</th><th>Usuario</th><th>Rol</th><th>Módulo</th><th>Acción</th>
              <th>Resultado</th><th>IP</th><th>Detalle</th>
            </tr>
          </thead>
          <tbody id="tbodyAudit"></tbody>
        </table>
      </div>
      <div class="card-footer d-flex justify-content-between" id="pagAudit"></div>
    </div>

    <div class="card border-0 shadow-sm mt-4 d-none" id="cardSeguridad">
      <div class="card-header bg-white fw-semibold">Eventos de seguridad recientes</div>
      <ul class="list-group list-group-flush" id="listSeguridad"></ul>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/notificaciones-ui.js"></script>
  <script src="/js/auditoria.js"></script>
</body>
</html>
