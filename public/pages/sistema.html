<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema — SENA Carnés</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/sena.css" rel="stylesheet">
  <link href="/css/sistema.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/dashboard.html"><i class="bi bi-gear me-2"></i>SENA Carnés</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/auditoria.html">Auditoría</a></li>
          <li class="nav-item"><a class="nav-link active" href="/sistema.html">Sistema</a></li>
        </ul>
        <span class="text-white-50 small me-3" id="userName"></span>
        <div id="notifNavSlot" class="me-2"></div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i> Salir</button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div class="sistema-hero mb-4">
      <h1 class="h3 fw-bold mb-1">Configuración y monitoreo</h1>
      <p class="text-muted mb-0 small">Parámetros institucionales, sesiones activas y estado del sistema</p>
    </div>

    <ul class="nav nav-tabs mb-4" id="tabsSistema">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabConfig">Configuración</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabSesiones">Sesiones</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabMonitor">Monitoreo</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabNotif">Notificaciones <span class="badge bg-danger d-none" id="notifTabBadge">0</span></button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tabConfig">
        <div class="row g-4">
          <div class="col-lg-8">
            <form id="formConfig" class="card border-0 shadow-sm">
              <div class="card-body row g-3">
                <div class="col-md-8">
                  <label class="form-label">Nombre de la institución</label>
                  <input class="form-control" name="institucion_nombre" id="cfgNombre">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Idioma</label>
                  <select class="form-select" name="idioma" id="cfgIdioma"><option value="es">Español</option><option value="en">English (prep.)</option></select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Zona horaria</label>
                  <input class="form-control" name="timezone" id="cfgTz">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Sesión (horas)</label>
                  <input type="number" class="form-control" id="cfgSesionHoras" min="1" max="24">
                </div>
                <div class="col-md-4">
                  <label class="form-label">Vigencia carné (años)</label>
                  <input type="number" class="form-control" name="carnet_vigencia_anos" id="cfgVigencia" min="1" max="5">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Formato código carné</label>
                  <input class="form-control" name="carnet_codigo_formato" id="cfgFormato" placeholder="{REGIONAL}-{YEAR}-{SEQ}">
                </div>
                <div class="col-md-3">
                  <label class="form-label">Máx. foto (MB)</label>
                  <input type="number" class="form-control" name="upload_max_mb" id="cfgUpload" min="1" max="20">
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar configuración</button>
                </div>
              </div>
            </form>
          </div>
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
              <div class="card-header bg-white fw-semibold">Logo institucional</div>
              <div class="card-body text-center">
                <img id="logoPreview" src="/uploads/placeholder-avatar.png" alt="Logo" class="logo-preview mb-3">
                <form id="formLogo">
                  <input type="file" class="form-control form-control-sm mb-2" name="logo" accept="image/*" id="inputLogo">
                  <button type="submit" class="btn btn-outline-primary btn-sm w-100">Subir logo</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tabSesiones">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white fw-semibold">Sesiones activas</div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead><tr><th>Usuario</th><th>Rol</th><th>Dispositivo</th><th>IP</th><th>Última actividad</th><th></th></tr></thead>
              <tbody id="tbodySesiones"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tabMonitor">
        <div class="row g-3" id="monitorCards"></div>
        <div class="card border-0 shadow-sm mt-3">
          <div class="card-header bg-white fw-semibold">Diagnóstico de seguridad</div>
          <div class="card-body" id="diagSeguridad"></div>
        </div>
      </div>

      <div class="tab-pane fade" id="tabNotif">
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted small">Notificaciones internas del sistema</span>
          <button class="btn btn-sm btn-outline-secondary" id="btnLeerTodas">Marcar todas leídas</button>
        </div>
        <div class="card border-0 shadow-sm" id="notifList"></div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/notificaciones-ui.js"></script>
  <script src="/js/sistema.js"></script>
</body>
</html>
