<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENA Carnés — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="card shadow-lg border-0 auth-card">
          <div class="card-body p-5 text-center">
            <div class="auth-brand mb-4">
              <span class="auth-brand-icon"><i class="bi bi-shield-check"></i></span>
              <span class="auth-brand-text">SENA</span>
            </div>
            <h1 class="h3 fw-bold mb-2">Sistema de Gestión de Carnés</h1>
            <p class="text-muted mb-4">
              Plataforma institucional para emisión, validación y administración de carnés del Servicio Nacional de Aprendizaje.
            </p>
            <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
              <span class="status-dot status-dot--ok" aria-hidden="true"></span>
              <span class="text-success fw-medium">Servidor operativo</span>
            </div>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
              <a href="/login.html" class="btn btn-primary px-4">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
              </a>
              <a href="/api/health" class="btn btn-outline-secondary px-4" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-heart-pulse me-2"></i>API Health
              </a>
            </div>
          </div>
        </div>
        <p class="text-center text-muted small mt-4 mb-0">
          © Servicio Nacional de Aprendizaje — Colombia
        </p>
      </div>
    </div>
  </div>
</body>
</html>
